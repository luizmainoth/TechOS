<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechOS // Controle de Hardware</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="cyber-nav">
    <div class="nav-brand">
      <div class="glitch-icon">TS</div>
      <div class="brand-text">
        <h1>TECH_OS</h1>
        <span>SYSTEM_V_1.0 // HARDWARE_MANAGER</span>
      </div>
    </div>
    <div class="nav-stats">
      <input type="text" id="input-pesquisa" class="cyber-input search" placeholder="[BUSCAR_OS...]">
      <div class="stat-box">ATIVAS: <span id="contador">0</span></div>
    </div>
  </nav>

  <main class="cyber-dashboard">
    <div id="mensagem" class="mensagem" hidden></div>

    <section class="cyber-panel form-section">
      <div class="panel-header">
        <h2 id="form-titulo">> INICIALIZAR_NOVA_OS</h2>
      </div>
      
      <form id="form-os" class="horizontal-form">
        <input type="hidden" id="os-id">

        <div class="form-group">
          <label>CLIENTE</label>
          <input type="text" id="nome-cliente" class="cyber-input" required placeholder="NOME DO USUÁRIO">
        </div>

        <div class="form-group">
          <label>CPF_ID</label>
          <input type="text" id="cpf-cliente" class="cyber-input" required maxlength="14" placeholder="000.000.000-00">
        </div>

        <div class="form-group">
          <label>CÓDIGO_OS</label>
          <input type="text" id="codigo-os" class="cyber-input" required placeholder="OS-0000">
        </div>

        <div class="form-group">
          <label>OPERAÇÃO</label>
            <select id="tipo-servico" class="cyber-input" required>
              <option value="">[ SELECIONE ]</option>
              <option value="Livre">MONTAGEM SETUP</option>
              <option value="Costas">LIMPEZA PREVENTIVA</option>
              <option value="Peito">FORMATAÇÃO/SISTEMA</option>
              <option value="Borboleta">UPGRADE HARDWARE</option>
              <option value="Medley">REPARO PLACA</option>
            </select>
        </div>

        <div class="form-group small">
          <label>DATA_IN</label>
          <input type="date" id="data-entrada" class="cyber-input" required>
        </div>

        <div class="form-group small">
          <label>VALOR (R$)</label>
          <input type="number" id="valor-servico" class="cyber-input" step="0.01" min="0" required placeholder="0.00">
        </div>

        <div class="form-group small">
          <label>PRAZO (D)</label>
          <input type="number" id="prazo-entrega" class="cyber-input" min="0" required placeholder="DIAS">
        </div>

        <div class="form-actions">
          <button type="submit" id="btn-salvar" class="cyber-btn primary">EXECUTE()</button>
          <button type="button" id="btn-cancelar" class="cyber-btn secondary" hidden>ABORT()</button>
        </div>
      </form>
    </section>

    <section class="cyber-panel table-section">
      <div class="panel-header">
        <h2>> BANCO_DE_DADOS_ATIVO</h2>
      </div>
      
      <div class="table-container">
        <table class="cyber-table">
          <thead>
            <tr>
              <th>CÓDIGO</th>
              <th>CLIENTE</th>
              <th>OPERAÇÃO</th>
              <th>DATA_IN</th>
              <th>CPF</th>
              <th>VALOR</th>
              <th>PRAZO</th>
              <th>AÇÕES</th>
            </tr>
          </thead>
          <tbody id="lista-os">
            </tbody>
        </table>
        <p id="vazio" class="vazio" hidden>NO_DATA_FOUND // INICIE UMA NOVA ORDEM DE SERVIÇO.</p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
