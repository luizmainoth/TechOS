name: techos-app

services:
  postgres:
    image: postgres:16
    container_name: techos-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: techos_db
    ports:
      - "5432:5432"
    volumes:
      - techos_data:/var/lib/postgresql/data
    networks:
      - techos-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d techos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: techos-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/techos_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "123456"
      # Opcional: Garante que o Spring recrie as tabelas do zero nesse banco novo
      SPRING_JPA_HIBERNATE_DDL_AUTO: update 
    ports:
      - "8080:8080"
    networks:
      - techos-net

  frontend:
    build: ./frontend # (Confirme se a sua pasta do frontend chama 'frontend' mesmo)
    container_name: techos-frontend
    depends_on:
      - backend
    ports:
      - "8081:80"
    networks:
      - techos-net

networks:
  techos-net:
    driver: bridge

volumes:
  techos_data: